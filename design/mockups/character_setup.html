<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .arcane-glow {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }
        .void-light {
            filter: blur(80px);
            background: radial-gradient(circle, rgba(45, 212, 191, 0.15) 0%, rgba(13, 13, 26, 0) 70%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d0d1a; }
        ::-webkit-scrollbar-thumb { background: #7c3aed33; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0d0d1a] dark:bg-[#0d0d1a] flex justify-between items-center px-6 py-4 w-full z-50 fixed top-0 bg-[#1a1a28] shadow-[0_1px_0_0_rgba(124,58,237,0.1)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gradient-to-tr from-secondary to-primary flex items-center justify-center arcane-glow" data-alt="Glowing teal radial-gradient orb of the Familiar representing an eldritch AI presence">
<span class="material-symbols-outlined text-surface-container-lowest text-xs">auto_fix_high</span>
</div>
<h1 class="text-xl font-serif italic text-[#2dd4bf]">Familiar</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-sans text-xs tracking-wider text-[#ccc3d8] uppercase">Ritual in Progress</span>
<button class="text-[#d2bbff] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full relative">
<!-- Background Orbs -->
<div class="void-light absolute -top-20 -left-40 w-96 h-96 rounded-full -z-10"></div>
<div class="void-light absolute top-1/2 -right-40 w-80 h-80 rounded-full -z-10 opacity-50"></div>
<!-- Progress Indicator -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<h2 class="font-serif italic text-2xl text-primary">Character Setup</h2>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Step 3 of 4</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[75%] arcane-glow transition-all duration-1000 ease-out"></div>
</div>
</div>
<!-- Form Sections -->
<form class="space-y-10">
<!-- Identity Section -->
<section class="space-y-6">
<div class="relative">
<label class="font-serif text-lg text-secondary block mb-3 italic">Character Name</label>
<input class="w-full bg-surface-container-highest/30 border border-primary-container/20 rounded-[20px] px-6 py-4 text-on-surface focus:outline-none focus:border-secondary/60 transition-all placeholder:text-on-surface-variant/40 font-body" placeholder="How shall the scrolls remember you?" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="relative">
<label class="font-serif text-lg text-secondary block mb-3 italic">Species</label>
<select class="w-full bg-surface-container-highest/30 border border-primary-container/20 rounded-[20px] px-6 py-4 text-on-surface focus:outline-none focus:border-secondary/60 transition-all appearance-none font-body">
<option>Human</option>
<option>Elf</option>
<option>Tiefling</option>
<option>Dwarf</option>
<option>Dragonborn</option>
</select>
<span class="material-symbols-outlined absolute right-6 top-[54px] text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<div class="relative">
<label class="font-serif text-lg text-secondary block mb-3 italic">Class &amp; Subclass</label>
<input class="w-full bg-surface-container-highest/30 border border-primary-container/20 rounded-[20px] px-6 py-4 text-on-surface focus:outline-none focus:border-secondary/60 transition-all placeholder:text-on-surface-variant/40 font-body" placeholder="e.g. Paladin, Oath of Vengeance" type="text"/>
</div>
</div>
</section>
<!-- Persona Section -->
<section class="space-y-6 pt-4">
<div class="relative">
<label class="font-serif text-lg text-secondary block mb-1 italic">Vibe</label>
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-4">Define the essence of your presence</p>
<input class="w-full bg-surface-container-highest/30 border border-primary-container/20 rounded-[20px] px-6 py-4 text-on-surface focus:outline-none focus:border-secondary/60 transition-all placeholder:text-on-surface-variant/40 font-body italic" placeholder="e.g. Gruff but fiercely loyal, haunted by shadows" type="text"/>
</div>
<div class="relative">
<label class="font-serif text-lg text-secondary block mb-3 italic">Backstory</label>
<textarea class="w-full bg-surface-container-highest/30 border border-primary-container/20 rounded-[20px] px-6 py-6 text-on-surface focus:outline-none focus:border-secondary/60 transition-all placeholder:text-on-surface-variant/40 font-body leading-relaxed" placeholder="The threads of your fate began..." rows="6"></textarea>
</div>
</section>
<!-- Decorative Visual Break -->
<div class="flex justify-center py-4">
<div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-primary-container/30 to-transparent"></div>
</div>
<!-- CTA Section -->
<div class="pt-6 pb-12 flex flex-col items-center">
<button class="group relative px-12 py-5 bg-gradient-to-r from-primary-container to-[#6d28d9] rounded-[20px] text-on-primary font-body font-semibold tracking-wide arcane-glow hover:scale-105 transition-all duration-300" type="submit">
<span class="relative z-10 flex items-center gap-3">
                        Begin Summoning
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">auto_awesome</span>
</span>
<div class="absolute inset-0 rounded-[20px] bg-primary blur-md opacity-0 group-hover:opacity-20 transition-opacity"></div>
</button>
</div>
</form>
</main>
<!-- Bottom Navigation Shell (Relevance Check: Transactional/Task Focused - Suppressed but included as ghost layer for structure if needed) -->
<!-- Suppressed for this specific linear setup task to prioritize focus on the summoning -->
<div class="fixed bottom-0 left-0 w-full pointer-events-none p-12 overflow-hidden flex justify-center -z-10">
<img class="opacity-20 blur-2xl" data-alt="ethereal violet and teal smoke tendrils swirling in deep black void minimal abstract digital art high contrast with glowing embers" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNXUf1qb1aHxAcOKHBwJ2lPGkVL3nu6W1GqnNSlW4xaU8eg0nHuAvdIhETZq8DXvyUtklyEly9XkUwUY7UBFz_j-ZFzCV51emo85NDAFsn4H4ZBQTW5ppSnGMBTSsQSJv2WiYaa2U0n0-sdapc3Ooz4zXIf4vUMbEd7OrVLKsR9rM9viFj_xV6OOmuf6ericLaBF3GTSvo-hgiDargfYblBYkd_cotWTa7MUkkvriH4JdiPby6VZS7TPccUJTi206bactxEdUo0HoN"/>
</div>
</body></html>
