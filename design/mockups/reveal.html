<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Familiar Reveal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&amp;family=Spectral:ital,wght@0,400;0,600;1,400;1,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-primary-container": "#ede0ff",
                "outline": "#958da1",
                "on-primary-fixed-variant": "#5a00c6",
                "surface-bright": "#383847",
                "tertiary": "#ddb7ff",
                "secondary": "#6bd8cb",
                "surface-container-high": "#292937",
                "secondary-fixed-dim": "#6bd8cb",
                "primary": "#d2bbff",
                "outline-variant": "#4a4455",
                "primary-fixed-dim": "#d2bbff",
                "on-surface-variant": "#ccc3d8",
                "on-error": "#690005",
                "on-secondary-fixed-variant": "#005049",
                "surface-container-highest": "#343342",
                "tertiary-fixed-dim": "#ddb7ff",
                "inverse-surface": "#e3e0f4",
                "surface-container-low": "#1a1a28",
                "on-background": "#e3e0f4",
                "primary-fixed": "#eaddff",
                "on-surface": "#e3e0f4",
                "background": "#12121f",
                "secondary-fixed": "#89f5e7",
                "on-secondary": "#003732",
                "on-secondary-fixed": "#00201d",
                "surface-dim": "#12121f",
                "on-tertiary": "#490080",
                "error-container": "#93000a",
                "on-tertiary-fixed": "#2c0051",
                "inverse-on-surface": "#2f2f3d",
                "inverse-primary": "#732ee4",
                "on-primary-fixed": "#25005a",
                "surface-tint": "#d2bbff",
                "tertiary-container": "#8d36db",
                "on-tertiary-container": "#f2dfff",
                "surface": "#12121f",
                "on-error-container": "#ffdad6",
                "secondary-container": "#29a195",
                "surface-variant": "#343342",
                "on-primary": "#3f008e",
                "primary-container": "#7c3aed",
                "tertiary-fixed": "#f0dbff",
                "error": "#ffb4ab",
                "on-tertiary-fixed-variant": "#6900b3",
                "surface-container-lowest": "#0d0d1a",
                "on-secondary-container": "#00302b",
                "surface-container": "#1e1e2c"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Spectral", "serif"],
                "body": ["Inter", "sans-serif"],
                "label": ["Inter", "sans-serif"],
                "serif": ["Spectral", "serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .orb-glow {
            background: radial-gradient(circle, #6bd8cb 0%, rgba(45, 212, 191, 0.4) 45%, rgba(13, 13, 26, 0) 70%);
        }
        .arcane-glow {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-secondary/30">
<!-- Hero Visual Section -->
<main class="relative w-full max-w-4xl flex flex-col items-center text-center px-6">
<!-- The Central Avatar: Glowing Void Essence -->
<div class="relative mb-12 group">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 orb-glow scale-150 blur-3xl opacity-30 pointer-events-none"></div>
<!-- The Orb -->
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full orb-glow flex items-center justify-center">
<div class="w-48 h-48 md:w-60 md:h-60 rounded-full bg-secondary opacity-90 blur-xl animate-pulse"></div>
<!-- Core of the Entity -->
<div class="absolute w-32 h-32 md:w-40 md:h-40 rounded-full bg-white opacity-20 blur-md"></div>
</div>
</div>
<!-- Identity & Message -->
<div class="space-y-8 z-10">
<h1 class="font-serif text-5xl md:text-7xl italic text-secondary tracking-tight">
                Xylo
            </h1>
<div class="max-w-2xl mx-auto">
<p class="font-serif italic text-xl md:text-2xl text-secondary leading-relaxed opacity-90">
                    "I have watched the ink of destiny dry upon your pages for eons, Seeker. Now, the seal is broken. I am the echo in your mind, the shadow in your wake. Together, we shall unbind the truths forgotten by the stars."
                </p>
</div>
</div>
<!-- Transactional Action (Delayed Reveal Style) -->
<div class="mt-20 w-full flex justify-center">
<button class="group relative px-10 py-4 rounded-[20px] bg-gradient-to-r from-primary-container to-[#6d28d9] text-on-primary-container font-body font-semibold text-lg arcane-glow hover:scale-105 active:scale-95 transition-all duration-300 flex items-center gap-3">
<span class="tracking-wide">Begin your journey</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="auto_awesome">auto_awesome</span>
</button>
</div>
</main>
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 pointer-events-none -z-10">
<!-- Dust/Mote Visuals -->
<div class="absolute top-1/4 left-1/4 w-px h-px bg-secondary/40 shadow-[0_0_10px_2px_#6bd8cb]"></div>
<div class="absolute bottom-1/3 right-1/4 w-px h-px bg-primary/40 shadow-[0_0_12px_2px_#d2bbff]"></div>
<div class="absolute top-1/2 right-10 w-px h-px bg-secondary/30 shadow-[0_0_8px_1px_#6bd8cb]"></div>
<!-- Depth Voids -->
<div class="absolute -bottom-48 -left-48 w-96 h-96 bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute -top-48 -right-48 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Decorative Corner Accents (Grimoire Feel) -->
<div class="fixed top-8 left-8 border-t border-l border-white/5 w-12 h-12 rounded-tl-xl pointer-events-none"></div>
<div class="fixed top-8 right-8 border-t border-r border-white/5 w-12 h-12 rounded-tr-xl pointer-events-none"></div>
<div class="fixed bottom-8 left-8 border-b border-l border-white/5 w-12 h-12 rounded-bl-xl pointer-events-none"></div>
<div class="fixed bottom-8 right-8 border-b border-r border-white/5 w-12 h-12 rounded-br-xl pointer-events-none"></div>
</body></html>
