<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Familiar — Create Campaign</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400;1,6..72,700&amp;family=Spectral:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#ede0ff",
                    "outline": "#958da1",
                    "on-primary-fixed-variant": "#5a00c6",
                    "surface-bright": "#383847",
                    "tertiary": "#ddb7ff",
                    "secondary": "#6bd8cb",
                    "surface-container-high": "#292937",
                    "secondary-fixed-dim": "#6bd8cb",
                    "primary": "#d2bbff",
                    "outline-variant": "#4a4455",
                    "primary-fixed-dim": "#d2bbff",
                    "on-surface-variant": "#ccc3d8",
                    "on-error": "#690005",
                    "on-secondary-fixed-variant": "#005049",
                    "surface-container-highest": "#343342",
                    "tertiary-fixed-dim": "#ddb7ff",
                    "inverse-surface": "#e3e0f4",
                    "surface-container-low": "#1a1a28",
                    "on-background": "#e3e0f4",
                    "primary-fixed": "#eaddff",
                    "on-surface": "#e3e0f4",
                    "background": "#12121f",
                    "secondary-fixed": "#89f5e7",
                    "on-secondary": "#003732",
                    "on-secondary-fixed": "#00201d",
                    "surface-dim": "#12121f",
                    "on-tertiary": "#490080",
                    "error-container": "#93000a",
                    "on-tertiary-fixed": "#2c0051",
                    "inverse-on-surface": "#2f2f3d",
                    "inverse-primary": "#732ee4",
                    "on-primary-fixed": "#25005a",
                    "surface-tint": "#d2bbff",
                    "tertiary-container": "#8d36db",
                    "on-tertiary-container": "#f2dfff",
                    "surface": "#12121f",
                    "on-error-container": "#ffdad6",
                    "secondary-container": "#29a195",
                    "surface-variant": "#343342",
                    "on-primary": "#3f008e",
                    "primary-container": "#7c3aed",
                    "tertiary-fixed": "#f0dbff",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed-variant": "#6900b3",
                    "surface-container-lowest": "#0d0d1a",
                    "on-secondary-container": "#00302b",
                    "surface-container": "#1e1e2c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"],
                    "serif": ["Spectral", "serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .arcane-glow {
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
        }
        .input-glow:focus {
            box-shadow: 0 0 10px rgba(45, 212, 191, 0.2);
            outline: none;
        }
        .void-orb {
            background: radial-gradient(circle, rgba(45, 212, 191, 0.3) 0%, rgba(45, 212, 191, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#0d0d1a] shadow-[0_1px_0_0_rgba(124,58,237,0.1)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full void-orb flex items-center justify-center border border-secondary/20">
<div class="w-3 h-3 rounded-full bg-secondary shadow-[0_0_8px_rgba(45,212,191,0.8)]"></div>
</div>
<h1 class="text-2xl font-serif italic text-secondary">Familiar</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Editorial Header -->
<div class="mb-12 relative">
<div class="absolute -top-10 -left-10 w-40 h-40 void-orb opacity-50 blur-3xl pointer-events-none"></div>
<h2 class="text-5xl font-headline italic text-on-surface leading-tight">New <span class="text-primary-container">Campaign</span></h2>
</div>
<!-- Creation Form -->
<form class="space-y-8">
<!-- Campaign Name -->
<div class="space-y-2">
<label class="block font-label text-xs tracking-wider text-on-surface-variant ml-2 uppercase" for="campaign-name">Campaign Name</label>
<input class="w-full bg-surface-container-highest/30 border border-outline-variant/20 rounded-[20px] px-6 py-4 text-on-surface placeholder:text-outline-variant/60 focus:border-secondary/60 input-glow transition-all duration-300" id="campaign-name" placeholder="e.g., The Shadow of Aethelgard" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block font-label text-xs tracking-wider text-on-surface-variant ml-2 uppercase" for="description">Description</label>
<textarea class="w-full bg-surface-container-highest/30 border border-outline-variant/20 rounded-[20px] px-6 py-4 text-on-surface placeholder:text-outline-variant/60 focus:border-secondary/60 input-glow transition-all duration-300 resize-none" id="description" placeholder="Describe the world, the stakes, and the mystery..." rows="4"></textarea>
</div>
<!-- Add Players -->
<div class="space-y-4">
<label class="block font-label text-xs tracking-wider text-on-surface-variant ml-2 uppercase">Add Players</label>
<div class="min-h-[120px] w-full bg-surface-container-highest/30 border border-outline-variant/20 rounded-[20px] p-4 flex flex-wrap gap-3 content-start transition-all duration-300 focus-within:border-secondary/60 input-glow">
<!-- Pill Tags -->
<div class="bg-primary-container/20 border border-primary-container/30 px-4 py-2 rounded-full flex items-center gap-2 group transition-all hover:bg-primary-container/30">
<span class="text-sm font-label text-primary">elara_seeker@void.com</span>
<button class="text-primary/50 group-hover:text-primary" type="button">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<div class="bg-primary-container/20 border border-primary-container/30 px-4 py-2 rounded-full flex items-center gap-2 group transition-all hover:bg-primary-container/30">
<span class="text-sm font-label text-primary">korg_the_brave@realms.net</span>
<button class="text-primary/50 group-hover:text-primary" type="button">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<input class="flex-1 min-w-[200px] bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline-variant/60 py-2 px-2" placeholder="Add player by email..." type="email"/>
</div>
<p class="text-[10px] text-on-surface-variant/60 italic ml-2">Press enter to add multiple players.</p>
</div>
</form>
<!-- Decorative Element -->
<div class="mt-16 flex justify-center">
<div class="h-[1px] w-32 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</main>
<!-- Fixed Action Footer -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/80 backdrop-blur-xl py-6 px-6 flex justify-center border-t border-outline-variant/10">
<button class="w-full max-w-md bg-gradient-to-r from-primary-container to-[#6d28d9] text-on-primary-container py-5 rounded-[20px] font-bold tracking-[0.1em] uppercase text-sm arcane-glow hover:opacity-90 active:scale-95 transition-all duration-300 shadow-[0_0_20px_rgba(124,58,237,0.3)]">
            Create Campaign
        </button>
</div>
<!-- Background Orbs -->
<div class="fixed top-1/4 -right-20 w-80 h-80 void-orb opacity-20 blur-[100px] pointer-events-none z-0"></div>
<div class="fixed bottom-1/4 -left-20 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
</body></html>
